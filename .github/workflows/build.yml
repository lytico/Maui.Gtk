name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push_nuget:
        description: 'Push packages to NuGet.org'
        required: false
        default: 'false'
        type: boolean

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore -p:EnableMauiDevFlow=false

      - name: Build
        run: dotnet build -c Release --no-restore -p:EnableMauiDevFlow=false

      - name: Pack libraries
        run: |
          dotnet pack src/Maui.Linux -c Release --no-build -o artifacts/
          dotnet pack src/Maui.Linux.Essentials -c Release --no-build -o artifacts/
          dotnet pack src/Maui.Linux.BlazorWebView -c Release --no-build -o artifacts/

      - name: Pack templates
        run: dotnet pack templates/Maui.Linux.Templates.csproj -c Release -o artifacts/

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

  push:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.push_nuget == 'true'

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Push to NuGet.org
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
